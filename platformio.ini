[env]
build_flags = -std=gnu++17
build_unflags = -std=gnu++11  ; remove gcc default; both envs inherit this

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    256dpi/MQTT@^2.5.3
    bblanchon/ArduinoJson@^7.0.0

[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
